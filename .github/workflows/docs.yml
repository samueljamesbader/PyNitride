name: Docs

# This workflow used to build the documentation (see commented out sections below),
# but now we use ReadTheDocs for that.
# So now it just deploys to GitHub Pages a static redirect to ReadTheDocs,
# which is needed to maintain the old URL for the docs.

on:
  #workflow_run:
  #  workflows: ["Tests"]
  #  types: [completed]
  #  branches:
  #    - main
  push:
    branches:
      - main

jobs:
  docs:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    #if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      #- uses: actions/setup-python@v6
      #  with:
      #    python-version: "3.14"
      #- name: Install package and dev dependencies
      #  run: pip install -e ".[dev]"
      #- name: Build documentation
      #  run: python docs/document.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          #path: docs/build/
          path: docs/maintain_redirect/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
