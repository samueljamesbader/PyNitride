name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install package
        run: pip install -e ".[dev]" --no-deps
      - name: Check dependencies are satisfiable
        run: pip check
      - name: Check requirements.txt is up to date
        run: |
          pip-compile --no-annotate --no-allow-unsafe --no-header --extra dev -o requirements.txt pyproject.toml
          git diff --exit-code requirements.txt
      - name: Run pytest
        run: pytest tests/
      - name: Ensure docs build
        run: python sphinx/document.py

  docs:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == github.event.repository.default_branch && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"
      - name: Build documentation
        run: python sphinx/document.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
