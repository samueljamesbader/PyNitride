name: PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build_wheels:
    uses: ./.github/workflows/build_wheels.yml

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Check tag matches wheel version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if ! ls dist/*-"${tag}"-*.whl > /dev/null 2>&1; then
            echo "Error: tag '${GITHUB_REF_NAME}' does not match any wheel in dist/"
            echo "Expected version: ${tag}"
            echo "Wheels found:"; ls dist/
            exit 1
          fi

      - uses: pypa/gh-action-pypi-publish@release/v1
