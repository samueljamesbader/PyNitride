version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
  jobs:
    pre_build:
      # Generate API reference RST files (mirrors what docs/document.py does)
      - sphinx-apidoc -o docs/auto src/pynitride -f -e

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev
